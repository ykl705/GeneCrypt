name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33 virtualenv buildozer

      - name: Pre-accept Android SDK license
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/licenses"
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$SDK_DIR/licenses/android-sdk-license"

      - name: Create GL compatibility header in NDK
        run: |
          NDK_SYSROOT="$HOME/.buildozer/android/platform/android-ndk-r25b/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include"
          mkdir -p "$NDK_SYSROOT/GL"
          cat > "$NDK_SYSROOT/GL/gl.h" << 'GLHEADER'
          #ifndef ANDROID_GL_COMPAT_H
          #define ANDROID_GL_COMPAT_H
          #include <GLES2/gl2.h>
          #endif
          GLHEADER

      - name: Build APK
        run: |
          KIVY_GL_BACKEND=gles buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: genecrypt-apk
          path: ./bin/*.apk
