name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33 virtualenv buildozer

      - name: Download Android SDK/NDK tools (first pass)
        run: |
          buildozer android debug 2>&1 || true

      - name: Accept Android SDK licenses
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          yes | "$SDK_DIR/tools/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses || true

      - name: Create GL compatibility headers in NDK + clean build state
        run: |
          NDK_SYSROOT="$HOME/.buildozer/android/platform/android-ndk-r25b/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include"
          mkdir -p "$NDK_SYSROOT/GL"
          printf '#include <GLES2/gl2.h>\n' > "$NDK_SYSROOT/GL/gl.h"
          printf '#include <GLES2/gl2ext.h>\n' > "$NDK_SYSROOT/GL/glext.h"
          # Clean partial build artifacts from first pass
          rm -rf .buildozer/android/platform/build-arm64-v8a

      - name: Build APK
        run: |
          export CFLAGS="$CFLAGS -D__USE_OPENGL_ES2=1"
          KIVY_GL_BACKEND=gles buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: genecrypt-apk
          path: ./bin/*.apk
