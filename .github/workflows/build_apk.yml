name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install 'Cython>=3.1.0' virtualenv buildozer

      - name: Bundle Chinese font for APK
        run: |
          sudo apt-get install -y fonts-droid-fallback
          mkdir -p assets/fonts
          cp /usr/share/fonts/truetype/droid/DroidSansFallbackFull.ttf assets/fonts/DroidSansFallback.ttf
          echo "Font: $(ls -lh assets/fonts/DroidSansFallback.ttf)"

      - name: Pre-create NDK GL compatibility symlinks
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r28c"
          SYSROOT="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr"
          mkdir -p "$SYSROOT/include/GL"
          echo "#include <GLES2/gl2.h>" > "$SYSROOT/include/GL/gl.h"
          echo "#include <GLES2/gl2ext.h>" > "$SYSROOT/include/GL/glext.h"
          mkdir -p "$SYSROOT/lib/aarch64-linux-android/21"
          ln -sf libGLESv2.so "$SYSROOT/lib/aarch64-linux-android/21/libGL.so"
          echo "Pre-created GL symlinks"

      - name: Build APK
        timeout-minutes: 45
        run: |
          export CFLAGS="$CFLAGS -D__USE_OPENGL_ES2=1 -DCYTHON_ABI_VERSION=0x100B0D"
          KIVY_GL_BACKEND=gles buildozer android debug --verbose 2>&1 | tee buildozer_build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: genecrypt-apk
          path: ./bin/*.apk

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: buildozer-logs
          path: buildozer_build.log
