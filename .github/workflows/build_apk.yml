name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install 'Cython>=3.1.0' virtualenv buildozer

      - name: Bundle Chinese font for APK
        run: |
          sudo apt-get install -y fonts-wqy-microhei
          pip install fonttools
          mkdir -p assets/fonts
          python3 -c 'from fontTools.ttLib import TTFont; f=TTFont("/usr/share/fonts/truetype/wqy/wqy-microhei.ttc", fontNumber=0); f.save("assets/fonts/wqy-microhei.ttf")'
          echo "Font bundled: $(ls -lh assets/fonts/wqy-microhei.ttf)"

      - name: Download Android SDK/NDK tools only
        run: |
          timeout 180 buildozer android debug --verbose 2>&1 | tee buildozer_firstpass.log || true

      - name: Accept Android SDK licenses
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          yes | "$SDK_DIR/tools/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses 2>/dev/null || true

      - name: Setup NDK GL compatibility headers
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r28c"
          NDK_SYSROOT="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include"
          mkdir -p "$NDK_SYSROOT/GL"
          printf '#include <GLES2/gl2.h>\n' > "$NDK_SYSROOT/GL/gl.h"
          printf '#include <GLES2/gl2ext.h>\n' > "$NDK_SYSROOT/GL/glext.h"
          GLES_FILE="$(find "$NDK_DIR" -name "libGLESv2.so" -path "*/aarch64-linux-android/*" 2>/dev/null | head -1)"
          if [ -n "$GLES_FILE" ] && [ -f "$GLES_FILE" ]; then
            ln -sf libGLESv2.so "$(dirname "$GLES_FILE")/libGL.so"
            echo "Created libGL.so symlink in $(dirname "$GLES_FILE")"
          fi
          rm -rf .buildozer/android/platform/build-*

      - name: Build APK
        run: |
          export CFLAGS="$CFLAGS -D__USE_OPENGL_ES2=1 -DCYTHON_ABI_VERSION=0x100B0D"
          KIVY_GL_BACKEND=gles buildozer android debug --verbose 2>&1 | tee buildozer_build.log

      - name: Debug APK output
        if: always()
        run: |
          echo "=== bin/ contents ==="
          ls -la bin/ 2>/dev/null || echo "bin/ does not exist"
          echo "=== .buildozer/android/platform/ contents ==="
          ls .buildozer/android/platform/ 2>/dev/null || echo "no platform dir"

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: buildozer-logs
          path: buildozer_build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: genecrypt-apk
          path: ./bin/*.apk
