name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          pip install 'Cython>=0.29,<3.0' virtualenv buildozer

      - name: Download Android SDK/NDK tools (first pass)
        run: |
          buildozer android debug --verbose 2>&1 | tee buildozer_firstpass.log || true

      - name: Accept Android SDK licenses
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          yes | "$SDK_DIR/tools/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses || true

      - name: Create GL compatibility headers in NDK + clean build state
        run: |
          NDK="$HOME/.buildozer/android/platform/android-ndk-r28c"
          NDK_SYSROOT="$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include"
          mkdir -p "$NDK_SYSROOT/GL"
          printf '#include <GLES2/gl2.h>\n' > "$NDK_SYSROOT/GL/gl.h"
          printf '#include <GLES2/gl2ext.h>\n' > "$NDK_SYSROOT/GL/glext.h"
          # Create libGL.so -> libGLESv2.so symlink so Kivy's desktop GL backends link
          NDK_LIBDIR="$(find "$NDK" -name "libGLESv2.so" -path "*/aarch64-linux-android/*" 2>/dev/null | head -1 | xargs dirname)"
          if [ -n "$NDK_LIBDIR" ] && [ -f "$NDK_LIBDIR/libGLESv2.so" ]; then
            ln -sf libGLESv2.so "$NDK_LIBDIR/libGL.so"
            echo "Created libGL.so -> libGLESv2.so symlink in $NDK_LIBDIR"
          fi
          # Clean partial build artifacts from first pass
          rm -rf .buildozer/android/platform/build-arm64-v8a

      - name: Build APK
        run: |
          export CFLAGS="$CFLAGS -D__USE_OPENGL_ES2=1"
          KIVY_GL_BACKEND=gles buildozer android debug --verbose 2>&1 | tee buildozer_build.log

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: buildozer-logs
          path: buildozer_*.log

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: genecrypt-apk
          path: ./bin/*.apk